# Configuration nginx du site public du Tennis Club Issois.
#
# Fichier séparé plutôt qu'un `printf` dans le Dockerfile : la configuration a
# grossi (en-têtes de sécurité, cache, compression) et un fichier se relit et
# se corrige, contrairement à une ligne de shell échappée.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Le site est servi derrière le reverse-proxy de Coolify, qui termine le
  # TLS. Nginx ne voit donc que du HTTP : la redirection vers HTTPS et le
  # certificat sont gérés en amont, pas ici.

  # ── Sécurité ───────────────────────────────────────────────────
  # Le site est entièrement autonome : aucune police, aucun script, aucune
  # image distante. La politique peut donc être stricte. Seul `style-src`
  # tolère l'inline, à cause des attributs `style="..."` présents dans les
  # pages ; les scripts, eux, sont tous dans des fichiers.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), interest-cohort=()" always;

  # Volontairement absent : Strict-Transport-Security. L'en-tête est mémorisé
  # par les navigateurs pendant toute sa durée de vie et ne peut pas être
  # révoqué. À activer une fois le certificat stable, pas au premier
  # déploiement.

  server_tokens off;

  # ── Compression ────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_types text/plain text/css application/javascript application/xml image/svg+xml;

  # ── Cache ──────────────────────────────────────────────────────
  # Les pages HTML changent à chaque mise à jour du club et sont revalidées à
  # chaque visite : une modification d'horaire doit être visible tout de
  # suite. Les images et la feuille de style, elles, sont stables.
  location ~* \.html$ {
    add_header Cache-Control "no-cache" always;
  }
  location ~* \.(png|jpg|jpeg|svg|ico|webp)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }
  location ~* \.(css|js)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  # ── Routage ────────────────────────────────────────────────────
  # `$uri.html` permet d'accepter /le-club aussi bien que /le-club.html, sans
  # avoir à réécrire les liens du site.
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  error_page 404 /404.html;
  location = /404.html { internal; }
}
